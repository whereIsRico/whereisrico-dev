<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · whereisrico.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #111418;
      color: #E2EAF4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #68A4FF;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(60px, 12vw, 120px);
      font-weight: 700;
      color: #1E2D45;
      line-height: 1;
      margin-bottom: 8px;
    }
    h2 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      color: #68A4FF;
      margin-bottom: 20px;
    }
    p {
      font-size: 16px;
      color: #8AAAC8;
      font-weight: 300;
      margin-bottom: 40px;
    }
    a {
      background: #2176FF;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <p class="label">// error 404</p>
  <h1>404</h1>
  <h2>rico's not here.</h2>
  <p>Where is Rico? He definitely isn't here. Head back home.</p>
  <a href="/">← back home</a>
</body>
</html>
